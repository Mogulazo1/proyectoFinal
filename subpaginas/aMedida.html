<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ullcom - Muebles a medida</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header class="site-header">
        <nav class="navbar navbar-expand-lg">
            <div class="container">
                <span class="navbar-brand p-0">
                    <img src="/img/Logos PNG/Logo ULLCOM - Horizontal solo imagen PNG.png" alt="Logo Ullcom" class="brand-logo">
                </span>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="mainNavbar">
                    <div class="navbar-nav ms-auto">
                        <a class="nav-link" href="/index.html">Home</a>
                        <a class="nav-link" href="/subpaginas/nosotros.html">Nosotros</a>
                        <a class="nav-link" href="/subpaginas/aMedida.html">A medida</a>
                        <a class="nav-link" href="/subpaginas/estandar.html">Estandar</a>
                        <a class="nav-link" href="/subpaginas/contacto.html">Contacto</a>
                    </div>
                </div>
            </div>
        </nav>
    </header>
    <main class="site-main">
        <section class="sub-hero reveal-up">
            <img src="https://images.unsplash.com/photo-1616486029423-aaa4789e8c9a?auto=format&fit=crop&w=1400&q=80" alt="imagen de fondo">
            <p>¡Contanos tu proyecto!</p>
        </section>
        <section class="content-section reveal-up">
            <div class="container form-wrap">
                <form class="custom-form" id="customProjectForm" novalidate>
                    <label for="nombre">Nombre</label>
                    <input class="form-control" type="text" id="nombre" name="nombre" required>
                    <label for="apellido">Apellido</label>
                    <input class="form-control" type="text" id="apellido" name="apellido" required>
                    <label for="desc">Detallanos tu proyecto</label>
                    <textarea class="form-control" id="desc" name="desc" required></textarea>
                    <label for="imagenes-proyecto">Imagenes del proyecto</label>
                    <input class="form-control" type="file" id="imagenes-proyecto" name="imagenes-proyecto" accept="image/*" multiple>
                    <p class="field-help">Podes subir una o varias imagenes para mostrarnos tu idea.</p>
                    <button class="form-submit" type="submit">Enviar consulta</button>
                    <div id="projectNotice" class="alert alert-success mt-3 d-none" role="status" aria-live="polite">¡Tu proyecto fue enviado!</div>
                </form>
            </div>
        </section>
    </main>
    <footer class="site-footer">
        <div class="container footer-content">
            <div class="footer-main">
                <p class="footer-brand">Ullcom</p>
                <p class="footer-custom-text">Muebles premium, hechos a mano con toda la pasión y dedicación.</p>
            </div>
            <div class="footer-social">
                <button type="button" class="social-btn" aria-label="Instagram">Instagram</button>
                <button type="button" class="social-btn" aria-label="Facebook">Facebook</button>
                <button type="button" class="social-btn" aria-label="TikTok">TikTok</button>
            </div>
        </div>
        <p class="footer-note">Todos los derechos reservados &copy; Ullcom 2026</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script>
        const customProjectForm = document.getElementById("customProjectForm");
        const projectNotice = document.getElementById("projectNotice");
        let noticeTimer;

        if (customProjectForm && projectNotice) {
            customProjectForm.addEventListener("submit", function (event) {
                event.preventDefault();

                if (!customProjectForm.checkValidity()) {
                    customProjectForm.reportValidity();
                    return;
                }

                customProjectForm.reset();
                projectNotice.classList.remove("d-none");

                clearTimeout(noticeTimer);
                noticeTimer = setTimeout(function () {
                    projectNotice.classList.add("d-none");
                }, 3000);
            });
        }
    </script>
</body>
</html>
