<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header class="site-header">
        <nav class="navbar navbar-expand-lg">
            <div class="container">
                <span class="navbar-brand p-0">
                    <span class="brand-logo">U</span>
                </span>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="mainNavbar">
                    <div class="navbar-nav ms-auto">
                        <a class="nav-link" href="/index.html">Home</a>
                        <a class="nav-link" href="/subpaginas/nosotros.html">Nosotros</a>
                        <a class="nav-link" href="/subpaginas/aMedida.html">A medida</a>
                        <a class="nav-link" href="/subpaginas/estandar.html">Estandar</a>
                        <a class="nav-link" href="/subpaginas/contacto.html">Contacto</a>
                    </div>
                </div>
            </div>
        </nav>
    </header>
    <main class="site-main">
        <section class="sub-hero reveal-up">
            <img src="https://images.unsplash.com/photo-1616486029423-aaa4789e8c9a?auto=format&fit=crop&w=1400&q=80" alt="imagen de fondo">
            <p>¡Contanos tu proyecto!</p>
        </section>
        <section class="content-section reveal-up">
            <div class="container form-wrap">
                <form class="custom-form">
                    <label for="nombre">Nombre</label>
                    <input class="form-control" type="text" id="nombre" name="nombre" required>
                    <label for="apellido">Apellido</label>
                    <input class="form-control" type="text" id="apellido" name="apellido" required>
                    <label for="desc">Detallanos tu proyecto</label>
                    <textarea class="form-control" id="desc" name="desc" required></textarea>
                    <button class="form-submit" type="button">Enviar consulta</button>
                </form>
            </div>
        </section>
    </main>
    <footer class="site-footer">
        <div class="container footer-content">
            <div class="footer-main">
                <p class="footer-brand">Ullcom</p>
                <p class="footer-custom-text">(aca va el texto que vas a escribir vos)</p>
            </div>
            <div class="footer-social">
                <button type="button" class="social-btn" aria-label="Instagram">Instagram</button>
                <button type="button" class="social-btn" aria-label="Facebook">Facebook</button>
                <button type="button" class="social-btn" aria-label="TikTok">TikTok</button>
            </div>
        </div>
        <p class="footer-note">ningun derecho reservado, pero por favor sea amable y no nos robe la pagina</p>
    </footer>
